appId: "${APP_ID}"
name: "dashboardTestFlow"
# Suite: Dashboard
# Consolidated test flow for Dashboard screen
# Contains 15 test case(s):
---
- launchApp: {}
- runFlow:
    file: "common/scrollUntilVisibleAndWait.yaml"
    env:
      WIDGET_ID: "view-emailField"
- runFlow:
    file: "common/inputTextAndWait.yaml"
    env:
      WIDGET_ID: "textInput-emailField"
      TEXT_VALUE: "${TC0360_EMAILFIELD_VALUE}"
- pressKey: "Enter"
- runFlow:
    file: "common/scrollUntilVisibleAndWait.yaml"
    env:
      WIDGET_ID: "view-textInput-passwordField"
