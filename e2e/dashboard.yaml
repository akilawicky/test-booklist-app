    env:
      WIDGET_ID: "button-loginButton"
- runFlow:
    file: "common/tapAndWait.yaml"
    env:
      WIDGET_ID: "button-loginButton"
- runFlow:
    file: "common/assertScreenVisibleAndWait.yaml"
    env:
      WIDGET_ID: "b080f036-4305-45de-865b-f23b09748495"
    optional: true
